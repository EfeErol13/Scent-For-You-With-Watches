<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent For You - Perfume Advisor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #bda370;
            --bg: #f9f9f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: var(--primary);
            text-transform: uppercase;
        }

        h1 span {
            color: var(--accent);
            font-weight: 600;
        }

        .step-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #eee;
            padding: 20px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .option-btn i {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ccc;
            transition: color 0.3s ease;
        }

        .option-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .option-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .option-btn.active i {
            color: var(--accent);
        }

        .option-btn.active.female-active {
            border-color: #d4a5b8;
            background: #4a3740;
        }
        .option-btn.active.female-active i {
            color: #d4a5b8;
        }

        .hidden {
            display: none;
        }

        #result-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .perfume-card {
            background: #fff;
            border: 1px solid #eee;
            border-left: 5px solid var(--accent);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .perfume-brand {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 600;
        }

        .perfume-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
            margin: 5px 0 10px 0;
        }

        .perfume-desc {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .perfume-notes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .note-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #555;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; margin: 10px auto; }
            .options-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Scent <span>For You</span></h1>

        <div id="step-gender">
            <div class="step-title"><i class="fa-solid fa-venus-mars"></i> Select Your Gender</div>
            <div class="options-grid">
                <button class="option-btn" onclick="selectGender('male')">
                    <i class="fa-solid fa-mars"></i>Male
                </button>
                <button class="option-btn" onclick="selectGender('female')">
                    <i class="fa-solid fa-venus"></i>Female
                </button>
            </div>
        </div>

        <div id="step-age" class="hidden">
            <div class="step-title"><i class="fa-solid fa-cake-candles"></i> Select Your Age Range</div>
            <div class="options-grid">
                <button class="option-btn" onclick="selectAge('10-15')">10 - 15</button>
                <button class="option-btn" onclick="selectAge('15-20')">15 - 20</button>
                <button class="option-btn" onclick="selectAge('20-25')">20 - 25</button>
                <button class="option-btn" onclick="selectAge('25+')">25+</button>
            </div>
        </div>

        <div id="step-environment" class="hidden">
            <div class="step-title"><i class="fa-solid fa-compass"></i> Select Atmosphere / Occasion</div>
            <div class="options-grid" id="env-buttons-container">
                </div>
        </div>

        <div id="result-section" class="hidden">
            <div class="step-title" style="color: var(--primary);"><i class="fa-solid fa-wand-magic-sparkles"></i> Recommendations For You</div>
            <div id="perfume-results"></div>
        </div>
    </div>

    <script>

                    ],

                        { brand: "Afnan", name: "9pm", desc: "Ultra-long lasting pear and vanilla party scent, highly loved by younger crowds.", notes: ["Pear", "Lavender", "Vanilla"] }
                    ]

                    school: [
                        { brand: "YSL", name: "Y EDP", desc: "Modern, clean, apple and woody notes. Stays with you all day in college halls.", notes: ["Apple", "Sage", "Cedarwood"] },
                        { brand: "Armani", name: "Acqua Di Gio Profondo", desc: "Deep marine notes, masculine and ultra-fresh for university life.", notes: ["Marine Notes", "Rosemary", "Patchouli"] }
                    ],
                    work: [
                        { brand: "Prada", name: "L'Homme", desc: "The ultimate clean office scent. Luxurious soapy freshness with elegant iris.", notes: ["Iris", "Neroli", "Amber"] },
                        { brand: "Montblanc", name: "Explorer", desc: "Woody and citrusy blend, highly professional and charismatic for work environments.", notes: ["Bergamot", "Leather", "Patchouli"] }
                    ],

                    ],

                    ],

                    ]

                    ],

                    ],

                '15-20': {
                    school: [
                        { brand: "Marc Jacobs", name: "Daisy", desc: "Innocent daisy and wild strawberry notes. Clean and lovely for high school or college.", notes: ["Strawberry", "Violet Leaf", "Jasmine"] }
                    ],

                    ],
                    beach: [

                    special: [

                    ]
                },

                    school: [

                    ],

                    ],
                    beach: [
                        { brand: "Estee Lauder", name: "Bronze Goddess", desc: "A luxury beach classic filled with rich coconut, tiare flower, and warm skin warmth.", notes: ["Coconut", "Tiare Flower", "Amber"] }
                    ],
                    special: [
                        { brand: "Yves Saint Laurent", name: "Black Opium", desc: "Seductive coffee, vanilla, and pear combination. A staple for exciting winter nights.", notes: ["Coffee", "Vanilla", "Pear"] }
                    ]
                },
                '25+': {
                    work: [
                        { brand: "Narciso Rodriguez", name: "For Her Pure Musc", desc: "Noble and elegant musk. Exudes corporate confidence, neatness, and empowerment.", notes: ["Musk", "White Flowers", "Cashmeran"] }
                    ],
                    daily: [
                        { brand: "Chanel", name: "Coco Mademoiselle", desc: "Timeless orange and patchouli blend. Elegant, rich, and classy for everyday wear.", notes: ["Orange", "Patchouli", "Turkish Rose"] }
                    ],
                    beach: [
                        { brand: "Tom Ford", name: "Soleil Blanc", desc: "Cardamom, ylang-ylang, and premium coco de mer. Ultra-luxe vacation and beach club perfume.", notes: ["Coconut", "Ylang-Ylang", "Cardamom"] }
                    ],
                    special: [
                        { brand: "Maison Francis Kurkdjian", name: "Baccarat Rouge 540", desc: "Exquisite saffron and amberwood. The most famous luxury niche scent that easily commands the room.", notes: ["Saffron", "Jasmine", "Amberwood"] }
                    ]
                }
            }
        };

        function selectGender(gender) {
            selections.gender = gender;
            const buttons = document.querySelectorAll('#step-gender .option-btn');
            buttons.forEach(btn => btn.classList.remove('active', 'female-active'));
            
            const selectedBtn = event.currentTarget;
            if (gender === 'female') {
                selectedBtn.classList.add('active', 'female-active');
            } else {
                selectedBtn.classList.add('active');
            }
            document.getElementById('step-age').classList.remove('hidden');
            resetFromStep('age');
        }

        function selectAge(age) {
            selections.age = age;
            const buttons = document.querySelectorAll('#step-age .option-btn');
            buttons.forEach(btn => btn.classList.remove('active', 'female-active'));
            
            const selectedBtn = event.currentTarget;
            if (selections.gender === 'female') {
                selectedBtn.classList.add('active', 'female-active');
            } else {
                selectedBtn.classList.add('active');
            }
            buildEnvironmentButtons(age);
            document.getElementById('step-environment').classList.remove('hidden');
            resetFromStep('env');
        }

        function buildEnvironmentButtons(age) {
            const container = document.getElementById('env-buttons-container');
            container.innerHTML = '';

            const allEnvs = {
                school: { text: "School", icon: "fa-solid fa-graduation-cap" },
                work: { text: "Work", icon: "fa-solid fa-briefcase" },
                daily: { text: "Daily", icon: "fa-solid fa-house-user" },
                beach: { text: "Beach / Coast", icon: "fa-solid fa-umbrella-beach" },
                special: { text: "Special Night", icon: "fa-solid fa-champagne-glasses" }
            };

            let activeEnvs = [];

            if (age === '10-15' || age === '15-20') {
                activeEnvs = ['school', 'daily', 'beach', 'special'];
            } else if (age === '20-25') {
                activeEnvs = ['school', 'work', 'daily', 'beach', 'special'];
            } else if (age === '25+') {
                activeEnvs = ['work', 'daily', 'beach', 'special'];
            }

            activeEnvs.forEach(envKey => {
                const envInfo = allEnvs[envKey];
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<i class="${envInfo.icon}"></i>${envInfo.text}`;
                btn.onclick = (e) => selectEnvironment(envKey, e);
                container.appendChild(btn);
            });
        }

        function selectEnvironment(env, e) {
            selections.env = env;
            const buttons = document.querySelectorAll('#step-environment .option-btn');
            buttons.forEach(btn => btn.classList.remove('active', 'female-active'));
            
            if (selections.gender === 'female') {
                e.currentTarget.classList.add('active', 'female-active');
            } else {
                e.currentTarget.classList.add('active');
            }
            showResults();
        }

        function showResults() {
            const resultSection = document.getElementById('result-section');
            const resultsContainer = document.getElementById('perfume-results');
            resultsContainer.innerHTML = '';

            const perfumes = perfumeData[selections.gender]?.[selections.age]?.[selections.env] || [];

            if (perfumes.length === 0) {
                resultsContainer.innerHTML = '<p style="color: #999;">No matching perfumes found for this combination.</p>';
            } else {
                perfumes.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'perfume-card';
                    if(selections.gender === 'female') {
                        card.style.borderLeftColor = '#d4a5b8';
                    }
                    let notesHtml = p.notes.map(n => `<span class="note-tag">${n}</span>`).join('');
                    card.innerHTML = `
                        <div class="perfume-brand">${p.brand}</div>
                        <div class="perfume-name">${p.name}</div>
                        <div class="perfume-desc">${p.desc}</div>
                        <div class="perfume-notes">${notesHtml}</div>
                    `;
                    resultsContainer.appendChild(card);
                });
            }
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        function resetFromStep(step) {
            if (step === 'age') {
                document.getElementById('step-environment').classList.add('hidden');
                selections.age = null; selections.env = null;
            }
            if (step === 'env') { selections.env = null; }
            document.getElementById('result-section').classList.add('hidden');
        }
    </script>
</body>
</html>
