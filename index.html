<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent For You With Watches</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #FFFFFF;
            color: #111111;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        hr {
            border: 0;
            border-top: 1px solid #E9ECEF;
            margin: 20px 0;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        .radio-group, .select-group {
            margin-bottom: 25px;
        }
        .radio-options {
            display: flex;
            gap: 20px;
        }
        label {
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #CCCCCC;
            border-radius: 6px;
            font-size: 15px;
            background-color: #FFF;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: #111111;
        }
        .result-container {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .result-container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            border-radius: 8px;
            padding: 20px;
        }
        .watch-card {
            background-color: #F8F9FA;
            border: 1px solid #E9ECEF;
        }
        .perfume-card {
            background-color: #F4FBF7;
            border: 1px solid #E1F5EB;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .item-name {
            font-family: monospace;
            font-size: 15px;
            background-color: rgba(0,0,0,0.05);
            padding: 4px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .card-details {
            font-size: 14px;
            line-height: 1.5;
            color: #333333;
        }
        .notes-badge {
            font-size: 13px;
            color: #1E7E34;
            margin-bottom: 8px;
            font-weight: 500;
        }
        footer {
            text-align: center;
            color: #888888;
            font-size: 12px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⌚ Scent For You With Watches 🧪</h1>
    <p class="subtitle">Curate your perfect style identity effortlessly</p>
    <hr>

    <div class="radio-group">
        <div class="section-title">1. Select Your Gender:</div>
        <div class="radio-options">
            <label><input type="radio" name="gender" value="Men" checked onchange="updateMatch()"> Men</label>
            <label><input type="radio" name="gender" value="Women" onchange="updateMatch()"> Women</label>
        </div>
    </div>

    <div class="select-group">
        <div class="section-title">2. Choose Your Outfit Style for Today:</div>
        <select id="styleSelect" onchange="updateMatch()">
            <option value="1">1. Old Money</option>
            <option value="2">2. Casual</option>
            <option value="3">3. Classic</option>
            <option value="4">4. Sport</option>
            <option value="5">5. Special Night</option>
        </select>
    </div>

    <hr>

    <h3 style="text-align: center; font-size: 16px; margin-top: 10px;" id="resultHeader">✨ Your Match ✨</h3>
    
    <div class="result-container">
        <div class="card watch-card">
            <div class="card-title">⌚ Recommended Watch</div>
            <div class="item-name" id="watchModel">Loading...</div>
            <div class="card-details" id="watchDetails">Loading...</div>
        </div>

        <div class="card perfume-card">
            <div class="card-title">🧪 Recommended Perfume</div>
            <div class="item-name" id="perfumeName">Loading...</div>
            <div class="notes-badge" id="perfumeNotes">Loading...</div>
            <div class="card-details" id="perfumeDetails">Loading...</div>
        </div>
    </div>

    <footer>Scent For You With Watches © 2026</footer>
</div>

function updateMatch() {
    // Get selected gender
    const gender = document.querySelector('input[name="gender"]:checked').value;
    // Get selected style index
    const styleVal = document.getElementById("styleSelect").value;
    
    const match = database[gender][styleVal];
    
    // Update HTML Content dynamically
    document.getElementById("resultHeader").innerText = `✨ Your Match for ${gender} - ${match.Style} ✨`;
    document.getElementById("watchModel").innerText = match.Watch;
    document.getElementById("watchDetails").innerText = match.Watch_Details;
    document.getElementById("perfumeName").innerText = match.Perfume;
    document.getElementById("perfumeNotes").innerText = `Notes: ${match.Perfume_Notes}`;
    document.getElementById("perfumeDetails").innerText = match.Perfume_Details;
}

// Run once on load to initialize first view
