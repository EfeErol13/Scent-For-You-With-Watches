<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent For You With Watches</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        /* ABSOLUTE PURE WHITE EVERYWHERE */
        body {
            background-color: #FFFFFF;
            color: #000000;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #FFFFFF;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #000000;
            padding-bottom: 20px;
            background-color: #FFFFFF;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #000000;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .subtitle {
            color: #444444;
            font-size: 14px;
            font-style: italic;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000000;
            margin-bottom: 12px;
            margin-top: 30px;
        }
        /* PURE WHITE MINIMALIST BUTTONS WITH BLACK BORDERS */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .style-grid {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
        .custom-btn {
            background-color: #FFFFFF;
            border: 1px solid #000000;
            color: #000000;
            padding: 14px 18px;
            border-radius: 0px; /* Sharp, modern luxury edges */
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            text-align: center;
        }
        .custom-btn:hover {
            background-color: #000000;
            color: #FFFFFF;
        }
        .custom-btn.active {
            background-color: #000000;
            color: #FFFFFF;
        }
        /* OUTCOME RENDER AREA - ABSOLUTE WHITE */
        .result-wrapper {
            margin-top: 35px;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s ease-in-out;
        }
        .result-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }
        .result-header {
            text-align: center;
            font-size: 13px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 20px;
            padding: 12px;
            background: #FFFFFF;
            border: 1px solid #000000;
            letter-spacing: 1px;
        }
        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .result-container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #FFFFFF;
            border: 1px solid #000000;
            border-radius: 0px;
            padding: 22px;
        }
        .card-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin-bottom: 10px;
            border-bottom: 1px solid #000000;
            padding-bottom: 4px;
            display: inline-block;
        }
        .item-name {
            font-size: 19px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .notes-badge {
            font-size: 11px;
            color: #000000;
            background: #FFFFFF;
            padding: 6px 0px;
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.4;
            border-bottom: 1px dashed #000000;
        }
        .card-details {
            font-size: 13px;
            line-height: 1.6;
            color: #222222;
        }
        footer {
            text-align: center;
            color: #777777;
            font-size: 11px;
            margin-top: 50px;
            border-top: 1px solid #000000;
            padding-top: 15px;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Scent For You With Watches</h1>
        <p class="subtitle">Curate Your Olfactory and Horological Identity</p>
    </header>

    <div class="section-title">1. Select Perspective</div>
    <div class="btn-grid">

    </div>

    <div class="section-title">2. Choose Outfit Style Concept</div>
    <div class="btn-grid style-grid">

        <button class="custom-btn" id="btn-3" onclick="setStyle('3')">Classic Business / Formal</button>
        <button class="custom-btn" id="btn-4" onclick="setStyle('4')">Streetwear / Modern Hype</button>
        <button class="custom-btn" id="btn-5" onclick="setStyle('5')">Sporty / Active Lifestyle</button>
        <button class="custom-btn" id="btn-6" onclick="setStyle('6')">Night Out / Date Night</button>
    </div>

    <div class="result-wrapper" id="resultWrapper">
        <div class="result-header" id="resultHeader">YOUR CURATED SELECTION</div>
        
        <div class="result-container">
            <div class="card watch-card">
                <div class="card-type">Recommended Watch</div>
                <div class="item-name" id="watchModel">Watch Model</div>
                <div class="card-details" id="watchDetails">Details</div>
            </div>

            <div class="card perfume-card">

                <div class="notes-badge" id="perfumeNotes">Notes</div>
                <div class="card-details" id="perfumeDetails">Details</div>
            </div>
        </div>
    </div>

    <footer>Scent For You With Watches © 2026</footer>
</div>

function setGender(gender) {
    currentGender = gender;
    document.getElementById('btn-Men').classList.remove('active');
    document.getElementById('btn-Women').classList.remove('active');
    document.getElementById(`btn-${gender}`).classList.add('active');
    updateDisplay();
}

function setStyle(styleKey) {
    currentStyle = styleKey;
    for (let i = 1; i <= 6; i++) {
        document.getElementById(`btn-${i}`).classList.remove('active');
    }
    document.getElementById(`btn-${styleKey}`).classList.add('active');
    updateDisplay();
}

function updateDisplay() {
    const match = database[currentGender][currentStyle];
    const wrapper = document.getElementById('resultWrapper');
    
    wrapper.classList.remove('show');
    
    setTimeout(() => {
        document.getElementById("resultHeader").innerText = `CURATED BLUEPRINT FOR ${currentGender.toUpperCase()} - ${match.Style.toUpperCase()}`;
        document.getElementById("watchModel").innerText = match.Watch;
        document.getElementById("watchDetails").innerText = match.Watch_Details;
        document.getElementById("perfumeName").innerText = match.Perfume;
        document.getElementById("perfumeNotes").innerText = `Olfactory Notes: ${match.Perfume_Notes}`;
        document.getElementById("perfumeDetails").innerText = match.Perfume_Details;
        
        wrapper.classList.add('show');
    }, 50);
}

// Start app
updateDisplay();
</script>

</body>
</html>
