<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent & Time Luxury Curator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #0B0F19;
            color: #F3F4F6;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFF 0%, #9CA3AF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #9CA3AF;
            font-size: 15px;
            font-weight: 400;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6B7280;
            margin-bottom: 15px;
            margin-top: 30px;
        }
        /* Modern Button Architecture */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }
        .style-grid {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }
        .custom-btn {
            background-color: #1F2937;
            border: 1px solid #374151;
            color: #9CA3AF;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .custom-btn:hover {
            background-color: #374151;
            color: #FFF;
            border-color: #4B5563;
            transform: translateY(-2px);
        }
        .custom-btn.active {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            border-color: #3B82F6;
            color: #FFFFFF;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        /* Premium Display Cards */
        .result-wrapper {
            margin-top: 40px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .result-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }
        .result-header {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-left: 4px solid #3B82F6;
        }
        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 640px) {
            .result-container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }
        .watch-card::before { background: #3B82F6; }
        .perfume-card::before { background: #10B981; }

        .card-type {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9CA3AF;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 20px;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 8px;
        }
        .notes-badge {
            font-size: 12px;
            color: #10B981;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 500;
            line-height: 1.4;
        }
        .card-details {
            font-size: 14px;
            line-height: 1.6;
            color: #D1D5DB;
        }
        footer {
            text-align: center;
            color: #4B5563;
            font-size: 12px;
            margin-top: 60px;
            border-top: 1px solid #1F2937;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Scent & Time Luxury Curator</h1>
        <p class="subtitle">Curate your premium aesthetic blueprint seamlessly</p>
    </header>

    <div class="section-title">1. Select Perspective</div>
    <div class="btn-grid">
        <button class="custom-btn active" id="btn-Men" onclick="setGender('Men')">♂ Men</button>
        <button class="custom-btn" id="btn-Women" onclick="setGender('Women')">♀ Women</button>
    </div>

    <div class="section-title">2. Choose Outfit Style Concept</div>
    <div class="btn-grid style-grid">
        <button class="custom-btn active" id="btn-1" onclick="setStyle('1')">👔 Old Money</button>
        <button class="custom-btn" id="btn-2" onclick="setStyle('2')">👖 Casual Chic</button>
        <button class="custom-btn" id="btn-3" onclick="setStyle('3')">💼 Classic Business</button>
        <button class="custom-btn" id="btn-4" onclick="setStyle('4')">👟 Streetwear / Hype</button>
        <button class="custom-btn" id="btn-5" onclick="setStyle('5')">🌙 Special Night</button>
    </div>

    <div class="result-wrapper" id="resultWrapper">
        <div class="result-header" id="resultHeader">✨ Your Curated Match ✨</div>
        
        <div class="result-container">
            <div class="card watch-card">
                <div class="card-type">⌚ Recommended Watch</div>
                <div class="item-name" id="watchModel">Watch Model</div>
                <div class="card-details" id="watchDetails">Details</div>
            </div>

            <div class="card perfume-card">
                <div class="card-type">🧪 Recommended Perfume</div>
                <div class="item-name" id="perfumeName">Perfume Name</div>
                <div class="notes-badge" id="perfumeNotes">Notes</div>
                <div class="card-details" id="perfumeDetails">Details</div>
            </div>
        </div>
    </div>

    <footer>Scent & Time Curator © 2026</footer>
</div>

        "5": {
            "Style": "Special Night",
            "Watch": "Bulova Rubaiyat Diamond",
            "Watch_Details": "An artistic dress watch featuring an iconic crown placed at the 12 o'clock position and hand-set diamond accents. Shimmers beautifully under evening lighting.",

            "Perfume_Details": "An intoxicating, rich, and viral scent profile. Its unique blend of burnt sugar warmth and crystalline ambergris creates an elite aura for grand evening events."

};

function setGender(gender) {
    currentGender = gender;
    document.getElementById('btn-Men').classList.remove('active');
    document.getElementById('btn-Women').classList.remove('active');
    document.getElementById(`btn-${gender}`).classList.add('active');
    updateDisplay();
}

function setStyle(styleKey) {
    currentStyle = styleKey;
    for (let i = 1; i <= 5; i++) {
        document.getElementById(`btn-${i}`).classList.remove('active');
    }
    document.getElementById(`btn-${styleKey}`).classList.add('active');
    updateDisplay();
}

function updateDisplay() {
    const match = database[currentGender][currentStyle];
    const wrapper = document.getElementById('resultWrapper');
    
    // Smooth transition effect
    wrapper.classList.remove('show');
    
    setTimeout(() => {
        document.getElementById("resultHeader").innerText = `✨ CURATED BLUEPRINT FOR ${currentGender.toUpperCase()} - ${match.Style.toUpperCase()} ✨`;
        document.getElementById("watchModel").innerText = match.Watch;
        document.getElementById("watchDetails").innerText = match.Watch_Details;
        document.getElementById("perfumeName").innerText = match.Perfume;
        document.getElementById("perfumeNotes").innerText = `Olfactory Notes: ${match.Perfume_Notes}`;
        document.getElementById("perfumeDetails").innerText = match.Perfume_Details;
        
        wrapper.classList.add('show');
    }, 200);
}

// Initial setup
updateDisplay();
</script>

</body>
</html>
